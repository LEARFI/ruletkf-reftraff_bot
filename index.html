<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0f172a;
            --card: #1e293b;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .wheel-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 40px;
        }
        /* Стрелка */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 40px;
            background: var(--primary);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
            filter: drop-shadow(0 0 10px var(--primary));
        }
        /* Колесо на CSS */
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid var(--card);
            box-shadow: 0 0 30px rgba(0,0,0,0.5), 0 0 15px rgba(0,255,136,0.2);
            background: conic-gradient(
                #1e293b 0deg 45deg, #334155 45deg 90deg,
                #1e293b 90deg 135deg, #334155 135deg 180deg,
                #1e293b 180deg 225deg, #334155 225deg 270deg,
                #1e293b 270deg 315deg, #334155 315deg 360deg
            );
            transition: transform 4.5s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .center-dot {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40px; height: 40px;
            background: var(--bg);
            border: 4px solid var(--primary);
            border-radius: 50%;
            z-index: 5;
        }
        button {
            background: linear-gradient(135deg, #00ff88 0%, #00bd65 100%);
            border: none;
            padding: 16px 50px;
            color: #064e3b;
            font-size: 18px;
            font-weight: 800;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0,255,136,0.3);
        }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; filter: grayscale(1); }
        
        #result {
            margin-top: 25px;
            font-size: 20px;
            font-weight: 600;
            min-height: 30px;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div style="font-size: 24px; font-weight: 700; margin-bottom: 30px;">LUCKY WHEEL</div>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <div class="center-dot"></div>
        <div id="wheel"></div>
    </div>

    <button id="spinBtn" onclick="spin()">Крутить!</button>
    <div id="result"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentRotation = 0;

        function spin() {
            const btn = document.getElementById('spinBtn');
            const wheel = document.getElementById('wheel');
            const resDiv = document.getElementById('result');
            
            btn.disabled = true;
            resDiv.innerText = "Удача близко...";

            // Имитация перекрута: минимум 5 полных кругов + рандомный угол
            const extraDegrees = Math.floor(Math.random() * 360);
            const totalSpin = 1800 + extraDegrees; 
            currentRotation += totalSpin;

            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                // Математика выигрыша
                const prize = (Math.random() * (0.5 - 0.001) + 0.001).toFixed(3);
                resDiv.innerText = `Вы выиграли: $${prize}`;
                
                // Вибрация телефона (Haptic Feedback)
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

                // Отправка данных боту
                setTimeout(() => {
                    tg.sendData(JSON.stringify({action: "wheel_win", amount: prize}));
                }, 1500);
            }, 4500);
        }
    </script>
</body>
</html>

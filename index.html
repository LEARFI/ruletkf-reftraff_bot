<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; }
        .wheel-svg { width: 300px; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        button { padding: 15px 40px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-size: 18px; margin-top: 20px; }
        button:disabled { background: #1e293b; }
    </style>
</head>
<body>
    <h2>LUCKY WHEEL</h2>
    <svg class="wheel-svg" id="wheel" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="48" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
        <g id="content">
            <text x="50" y="20" fill="white" font-size="5" text-anchor="middle">$0.5</text>
            <text x="80" y="50" fill="white" font-size="5" text-anchor="middle">MISS</text>
            <text x="50" y="80" fill="white" font-size="5" text-anchor="middle">$0.1</text>
            <text x="20" y="50" fill="white" font-size="5" text-anchor="middle">MISS</text>
        </g>
    </svg>
    <br><button id="btn">КРУТИТЬ</button>
    <script>
        const tg = window.Telegram.WebApp;
        const btn = document.getElementById('btn');
        const wheel = document.getElementById('wheel');
        const prizes = [0.5, 0, 0.1, 0];
        btn.onclick = () => {
            btn.disabled = true;
            let deg = 1800 + Math.random() * 360;
            wheel.style.transform = `rotate(${deg}deg)`;
            setTimeout(() => {
                let sector = Math.floor(((360 - (deg % 360)) / 90)) % 4;
                tg.sendData(JSON.stringify({amount: prizes[sector]}));
                tg.close();
            }, 4000);
        };
    </script>
</body>
</html>

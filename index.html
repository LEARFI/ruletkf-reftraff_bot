<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .wheel-container { position: relative; width: 300px; height: 300px; }
        #wheel { width: 100%; height: 100%; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 20px; height: 30px; background: #00ff88; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }
        button { margin-top: 30px; padding: 10px 40px; border-radius: 10px; border: none; background: #00ff88; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wheel-container">
        <div class="pointer"></div>
        <svg id="wheel" viewBox="0 0 400 400">
            <g id="inner-wheel">
                <path d="M200,200 L200,10 A190,190 0 0,1 334,65 Z" fill="#1e293b" stroke="#0f172a"/>
                <text x="230" y="70" fill="#00ff88" transform="rotate(-65 200,200)" style="font-size:18px;">$0.1</text>
                
                <path d="M200,200 L334,65 A190,190 0 0,1 390,200 Z" fill="#334155" stroke="#0f172a"/>
                <text x="310" y="150" fill="#fff" transform="rotate(-20 200,200)" style="font-size:18px;">MISS</text>

                <path d="M200,200 L390,200 A190,190 0 0,1 334,334 Z" fill="#1e293b" stroke="#0f172a"/>
                <text x="310" y="240" fill="#00ff88" transform="rotate(25 200,200)" style="font-size:18px;">$0.01</text>

                <path d="M200,200 L334,334 A190,190 0 0,1 200,390 Z" fill="#334155" stroke="#0f172a"/>
                <text x="240" y="330" fill="#fff" transform="rotate(65 200,200)" style="font-size:18px;">MISS</text>

                <path d="M200,200 L200,390 A190,190 0 0,1 65,334 Z" fill="#1e293b" stroke="#0f172a"/>
                <text x="140" y="330" fill="#00ff88" transform="rotate(115 200,200)" style="font-size:18px;">$0.5</text>
                
                <circle cx="200" cy="200" r="20" fill="#00ff88"/>
            </g>
        </svg>
    </div>
    <button id="spinBtn">КРУТИТЬ</button>

    <script>
        const tg = window.Telegram.WebApp;
        const wheel = document.getElementById('wheel');
        const prizes = [0.1, 0, 0.01, 0, 0.5];
        let rotation = 0;

        document.getElementById('spinBtn').onclick = () => {
            rotation += 1800 + Math.random() * 360;
            wheel.style.transform = `rotate(${rotation}deg)`;
            
            setTimeout(() => {
                const deg = rotation % 360;
                const sector = Math.floor(((360 - deg + 36) % 360) / 72); 
                const win = prizes[sector] || 0;
                
                // ОТПРАВКА ДАННЫХ В БОТА
                tg.sendData(JSON.stringify({action: "wheel_win", amount: win}));
                tg.close();
            }, 5000);
        };
    </script>
</body>
</html>

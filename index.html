<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .wheel-container { position: relative; width: 320px; height: 320px; }
        #wheel-svg { width: 100%; height: 100%; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 30px; height: 40px; background: #00ff88; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }
        button { margin-top: 30px; background: linear-gradient(135deg, #00ff88, #00bd65); border: none; padding: 15px 50px; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; color: #064e3b; }
        button:disabled { filter: grayscale(1); opacity: 0.5; }
    </style>
</head>
<body>
    <div style="margin-bottom: 20px; font-size: 22px; font-weight: bold;">LUCKY WHEEL</div>
    <div class="wheel-container">
        <div class="pointer"></div>
        <svg id="wheel-svg" viewBox="0 0 400 400">
            <g id="spin-group">
                <path d="M200,200 L200,10 A190,190 0 0,1 334,65 Z" fill="#1e293b" stroke="#0f172a"/>
                <text x="240" y="80" fill="#00ff88" transform="rotate(-65 200,200)" style="font-size:14px">$0.1</text>
                
                <path d="M200,200 L334,65 A190,190 0 0,1 390,200 Z" fill="#334155" stroke="#0f172a"/>
                <text x="310" y="150" fill="#94a3b8" transform="rotate(-20 200,200)" style="font-size:14px">MISS</text>

                <path d="M200,200 L390,200 A190,190 0 0,1 334,334 Z" fill="#1e293b" stroke="#0f172a"/>
                <text x="310" y="240" fill="#00ff88" transform="rotate(25 200,200)" style="font-size:14px">$0.01</text>

                <path d="M200,200 L334,334 A190,190 0 0,1 200,390 Z" fill="#334155" stroke="#0f172a"/>
                <text x="250" y="320" fill="#94a3b8" transform="rotate(65 200,200)" style="font-size:14px">MISS</text>

                <path d="M200,200 L200,390 A190,190 0 0,1 65,334 Z" fill="#1e293b" stroke="#0f172a"/>
                <text x="140" y="320" fill="#00ff88" transform="rotate(115 200,200)" style="font-size:14px">$0.5</text>

                <path d="M200,200 L65,334 A190,190 0 0,1 10,200 Z" fill="#334155" stroke="#0f172a"/>
                <text x="70" y="250" fill="#94a3b8" transform="rotate(160 200,200)" style="font-size:14px">MISS</text>

                <path d="M200,200 L10,200 A190,190 0 0,1 65,65 Z" fill="#1e293b" stroke="#0f172a"/>
                <text x="70" y="160" fill="#00ff88" transform="rotate(205 200,200)" style="font-size:14px">$0.2</text>

                <path d="M200,200 L65,65 A190,190 0 0,1 200,10 Z" fill="#334155" stroke="#0f172a"/>
                <text x="130" y="80" fill="#94a3b8" transform="rotate(250 200,200)" style="font-size:14px">MISS</text>
                
                <circle cx="200" cy="200" r="30" fill="#0f172a" stroke="#00ff88" stroke-width="4"/>
            </g>
        </svg>
    </div>
    <button id="spinBtn" onclick="spin()">КРУТИТЬ!</button>
    <div id="status" style="margin-top:20px; color:#00ff88; font-weight:bold;"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let rotation = 0;
        const prizes = ["0.10", "0.00", "0.01", "0.00", "0.50", "0.00", "0.20", "0.00"];

        function spin() {
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            const wheel = document.getElementById('wheel-svg');
            
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += 1800 + randomExtra; 
            wheel.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                const actualDeg = rotation % 360;
                const sector = Math.floor(((360 - actualDeg + 22.5) % 360) / 45);
                const win = prizes[sector];
                
                document.getElementById('status').innerText = win > 0 ? `ВЫИГРЫШ: $${win}` : "ПРОМАХ!";
                
                // ОТПРАВКА ДАННЫХ БОТУ
                tg.sendData(JSON.stringify({action: "wheel_win", amount: win}));
                
                setTimeout(() => tg.close(), 2000);
            }, 5000);
        }
    </script>
</body>
</html>
